services:
  # ------------------------------------------------------------------
  # Kaspa Explorer (web UI)
  # ------------------------------------------------------------------
  kaspa_explorer:
    container_name: kaspa_explorer
    image: supertypo/kaspa-explorer:latest
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      REACT_APP_NETWORK: "Igra Devnet"
      # Point to the REST server by its service name and port
      API_URI: "http://devnet.igralabs.com:8000"
      # Point to the socket server by its service name and port
      API_WS_URI: "ws://devnet.igralabs.com:8001"
    networks:
      - kaspa-explorer-network
      - kaspa-explorer-nginx-network

  # ------------------------------------------------------------------
  # Kaspa REST Server
  # ------------------------------------------------------------------
  kaspa_rest_server:
    container_name: kaspa_rest_server
    image: kaspanet/kaspa-rest-server:latest
    restart: unless-stopped
    expose:
      - "8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      KASPAD_HOST_1: "host.docker.internal:17610"
      SQL_URI: "postgresql+asyncpg://postgres:postgres@kaspa_db:5432/postgres"
    networks:
      - kaspa-explorer-network

  # ------------------------------------------------------------------
  # Socket Server
  # ------------------------------------------------------------------
  simply_kaspa_socket_server:
    container_name: simply_kaspa_socket_server
    image: supertypo/simply-kaspa-socket-server:unstable
    restart: unless-stopped
    expose:
      - "8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: "-n devnet -x 20 -s ws://host.docker.internal:17610"
    networks:
      - kaspa-explorer-network
      - kaspa-explorer-nginx-network

  # ------------------------------------------------------------------
  # Simply Kaspa Indexer
  # ------------------------------------------------------------------
  simply_kaspa_indexer:
    container_name: simply_kaspa_indexer
    image: supertypo/simply-kaspa-indexer:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Connects to the host-based kaspad via Borsh at 17610
    command: "-n devnet -u -s ws://host.docker.internal:17610 -d postgresql://postgres:postgres@kaspa_db:5432/postgres"
    networks:
      - kaspa-explorer-network

  # ------------------------------------------------------------------
  # Postgres Database
  # ------------------------------------------------------------------
  kaspa_db:
    container_name: kaspa_db
    image: postgres:16-alpine
    restart: unless-stopped
    shm_size: 4G
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "postgres"
    # Publish DB to host localhost:5432 only (remove if not needed)
    expose:
      - "5432"
    volumes:
      - "/var/kaspa_db/:/var/lib/postgresql/data/"
    networks:
      - kaspa-explorer-network

networks:
  kaspa-explorer-network:
  kaspa-explorer-nginx-network:
    external: true
